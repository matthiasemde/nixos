[http.middlewares]
[http.middlewares.cors-allow-post.headers]
accessControlAllowOriginList = ["*"]
accessControlAllowMethods = ["POST"]
accessControlAllowHeaders = [
  "Accept",
  "Content-Type",
  "Content-Length",
  "Accept-Encoding",
  "X-CSRF-Token",
]
addVaryHeader = true

[http.middlewares.forward-auth.forwardAuth]
# Do not confuse "outpost" with "worker". The main server provides an "outpost"
# for Traefik, which is used for authentication. The "worker" is used for other
# purposes, e.g. routine jobs.
address = "http://authentik--server:9000/outpost.goauthentik.io/auth/traefik"
trustForwardHeader = true
maxResponseBodySize = 1048576 # 1 MiB
authResponseHeaders = [
  "X-authentik-username",
  "X-authentik-groups",
  "X-authentik-entitlements",
  "X-authentik-email",
  "X-authentik-name",
  "X-authentik-uid",
  "X-authentik-jwt",
  "X-authentik-meta-jwks",
  "X-authentik-meta-outpost",
  "X-authentik-meta-provider",
  "X-authentik-meta-app",
  "X-authentik-meta-version",
]

[http.middlewares.forward-auth-infra.forwardAuth]
address = "http://authentik--outpost-infra:9000/outpost.goauthentik.io/auth/traefik"
trustForwardHeader = true
maxResponseBodySize = 1048576 # 1 MiB
authResponseHeaders = [
  "X-authentik-username",
  "X-authentik-groups",
  "X-authentik-entitlements",
  "X-authentik-email",
  "X-authentik-name",
  "X-authentik-uid",
  "X-authentik-jwt",
  "X-authentik-meta-jwks",
  "X-authentik-meta-outpost",
  "X-authentik-meta-provider",
  "X-authentik-meta-app",
  "X-authentik-meta-version",
]
